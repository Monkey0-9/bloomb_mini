name: SatTrade CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  AWS_REGION: us-east-1

jobs:
  # ─── Stage 1: Lint & Type Check ─────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff mypy pydantic numpy scipy

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

      - name: Run MyPy type checker
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  # ─── Stage 2: Unit Tests ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]" || pip install pydantic numpy scipy pytest requests pyyaml prometheus_client

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short -x --junitxml=test-results.xml
        env:
          PYTHONPATH: .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─── Stage 3: Security Scan ─────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Bandit security scanner
        run: |
          pip install bandit
          bandit -r src/ -ll --skip B101,B603

      - name: Check for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true

  # ─── Stage 3b: CVE Container Scan ───────────────────────
  vulnerability_scan:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t sattrade:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sattrade:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ─── Stage 4: Build Docker Image ───────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, vulnerability_scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t sattrade:${GITHUB_SHA::8} .
          docker build -t sattrade:latest .

      - name: Run container smoke test
        run: |
          docker run --rm sattrade:latest python -c \
            "from src.common.config import load_constraints; c = load_constraints(); print(f'NAV: \${c.capital.simulated_nav_usd:,}')"

  # ─── Stage 5: Deploy to Staging ─────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker tag sattrade:latest $ECR_REGISTRY/sattrade:${GITHUB_SHA::8}
          docker tag sattrade:latest $ECR_REGISTRY/sattrade:staging
          docker push $ECR_REGISTRY/sattrade:${GITHUB_SHA::8}
          docker push $ECR_REGISTRY/sattrade:staging

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster sattrade-staging \
            --service sattrade-pipeline \
            --force-new-deployment
